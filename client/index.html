<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#6c63ff" />
  <title>ChatApp</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    /* ===== 重置 & 变量 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6c63ff;
      --primary-dark: #5a52d5;
      --primary-light: #ede9ff;
      --bg: #f5f6fa;
      --sidebar-bg: #1e1f2b;
      --sidebar-text: #c9cdd7;
      --sidebar-hover: #2e3047;
      --sidebar-active: #6c63ff;
      --card: #ffffff;
      --border: #e8eaf0;
      --text: #2d2d3a;
      --text-muted: #8b8fa8;
      --bubble-me: #6c63ff;
      --bubble-other: #ffffff;
      --bubble-me-text: #ffffff;
      --bubble-other-text: #2d2d3a;
      --danger: #ff5c5c;
      --success: #4caf50;
      --warning: #ff9800;
      --radius: 16px;
      --radius-sm: 8px;
      --shadow: 0 2px 16px rgba(108,99,255,0.10);
      --transition: 0.2s ease;
      --sidebar-w: 260px;
      --header-h: 60px;
    }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); }

    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0d3e0; border-radius: 3px; }

    /* ===== AUTH 页面 ===== */
    #auth-page {
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #6c63ff 0%, #48c6ef 100%);
    }
    .auth-box {
      background: var(--card); border-radius: 24px;
      padding: 48px 40px; width: 380px; max-width: 95vw;
      box-shadow: 0 20px 60px rgba(108,99,255,0.25);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .logo-icon { font-size: 48px; display: block; margin-bottom: 8px; }
    .auth-logo h1 { font-size: 24px; font-weight: 700; color: var(--primary); }
    .auth-logo p  { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .auth-tabs { display: flex; background: var(--bg); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 28px; }
    .auth-tab {
      flex: 1; text-align: center; padding: 9px; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: 500;
      color: var(--text-muted); transition: var(--transition);
    }
    .auth-tab.active { background: var(--card); color: var(--primary); box-shadow: var(--shadow); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 15px; outline: none;
      transition: border-color var(--transition);
      background: var(--bg);
    }
    .form-group input:focus { border-color: var(--primary); background: #fff; }
    .btn-primary {
      width: 100%; padding: 13px; background: var(--primary);
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.97); }
    .auth-error { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }

    /* ===== APP 布局 ===== */
    #app { display: none; height: 100vh; flex-direction: row; }
    #app.visible { display: flex; }

    /* ===== 侧边栏 ===== */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--sidebar-bg); color: var(--sidebar-text);
      display: flex; flex-direction: column; height: 100%;
      overflow: hidden;
      transition: transform var(--transition);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* 侧边栏可折叠 */
    .sidebar.collapsed { width: 44px !important; min-width: 44px !important; }
    .sidebar.collapsed .sidebar-section,
    .sidebar.collapsed .sidebar-item,
    .sidebar.collapsed .sidebar-footer,
    .sidebar.collapsed .sidebar-scroll,
    .sidebar.collapsed .app-title,
    .sidebar.collapsed .collapse-icon { display: none; }
    .sidebar.collapsed .sidebar-header { justify-content: center; padding: 0; }
    .sidebar.collapsed .logo { margin: 0; }
    /* 侧边栏内容滚动区 */
    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .sidebar-header {
      height: var(--header-h); display: flex; align-items: center;
      padding: 0 18px; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      cursor: pointer; user-select: none;
    }
    .sidebar-header .app-title { font-size: 17px; font-weight: 700; color: #fff; }
    .sidebar-header .logo { font-size: 24px; }
    .sidebar-section { padding: 14px 18px 6px; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.35); text-transform: uppercase; }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px; cursor: pointer; border-radius: 0;
      transition: background var(--transition), color var(--transition);
      font-size: 14px; color: var(--sidebar-text);
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: var(--sidebar-hover); color: #fff; }
    .sidebar-item.active { background: rgba(108,99,255,0.15); color: #fff; border-left-color: var(--primary); }
    .sidebar-item .item-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-item .item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-item .badge { background: var(--danger); color: #fff; font-size: 11px; font-weight: 700; border-radius: 10px; padding: 1px 6px; min-width: 18px; text-align: center; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    .sidebar-footer {
      margin-top: auto; border-top: 1px solid rgba(255,255,255,0.06);
      padding: 14px 18px; display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .user-avatar-sm {
      width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
      background: var(--primary-light); flex-shrink: 0;
    }
    .user-info-sm { flex: 1; overflow: hidden; }
    .user-info-sm .name { font-size: 13px; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-info-sm .status { font-size: 11px; color: var(--success); }
    .btn-logout {
      background: rgba(255,92,92,0.12);
      border: 1px solid rgba(255,92,92,0.25);
      color: var(--danger); cursor: pointer;
      font-size: 13px; font-weight: 600;
      padding: 5px 10px; border-radius: var(--radius-sm);
      transition: all var(--transition);
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-logout:hover { background: var(--danger); color: #fff; }

    /* ===== 主区域 ===== */
    .main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }

    /* ===== 聊天头部 ===== */
    .chat-header {
      height: var(--header-h); display: flex; align-items: center; padding: 0 20px;
      background: var(--card); border-bottom: 1px solid var(--border);
      gap: 12px; flex-shrink: 0; box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    }
    .menu-btn { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); padding: 4px; }
    .chat-header-title { font-size: 16px; font-weight: 700; }
    .chat-header-sub { font-size: 12px; color: var(--text-muted); }
    .header-actions { margin-left: auto; display: flex; gap: 8px; }
    .header-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 6px; border-radius: var(--radius-sm); color: var(--text-muted); transition: all var(--transition); }
    .header-btn:hover { background: var(--bg); color: var(--primary); }
    .online-count { font-size: 12px; color: var(--success); font-weight: 600; background: rgba(76,175,80,0.1); padding: 3px 10px; border-radius: 20px; }

    /* ===== 消息区域 ===== */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 20px 20px 10px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .msg-date-divider {
      text-align: center; font-size: 12px; color: var(--text-muted);
      margin: 10px 0; position: relative;
    }
    .msg-date-divider::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: var(--border); z-index: 0;
    }
    .msg-date-divider span { background: var(--bg); padding: 0 10px; position: relative; z-index: 1; }

    .message { display: flex; align-items: flex-end; gap: 8px; max-width: 70%; animation: msgIn 0.2s ease; }
    @keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    .message.me { align-self: flex-end; flex-direction: row-reverse; }
    .message.other { align-self: flex-start; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .msg-body { display: flex; flex-direction: column; gap: 3px; }
    .msg-name { font-size: 12px; color: var(--text-muted); font-weight: 600; padding: 0 4px; }
    .message.me .msg-name { text-align: right; }
    .msg-bubble {
      padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5;
      word-break: break-word; position: relative;
      max-width: 100%;
    }
    .message.me .msg-bubble { background: var(--bubble-me); color: var(--bubble-me-text); border-bottom-right-radius: 6px; }
    .message.other .msg-bubble { background: var(--bubble-other); color: var(--bubble-other-text); border-bottom-left-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .msg-time { font-size: 11px; color: var(--text-muted); padding: 0 4px; }
    .message.me .msg-time { text-align: right; }

    /* 系统消息 */
    .system-msg { text-align: center; font-size: 12px; color: var(--text-muted); padding: 4px 0; }
    .system-msg span { background: var(--border); padding: 3px 12px; border-radius: 20px; }

    /* 输入中提示 */
    .typing-indicator { font-size: 12px; color: var(--text-muted); padding: 4px 20px; min-height: 22px; font-style: italic; }

    /* ===== 输入框 ===== */
    .input-area {
      padding: 12px 16px; background: var(--card);
      border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .input-toolbar { display: flex; gap: 6px; }
    .toolbar-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px; border-radius: var(--radius-sm); color: var(--text-muted); transition: all var(--transition); }
    .toolbar-btn:hover { background: var(--bg); color: var(--primary); }
    #msg-input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 22px;
      padding: 10px 18px; font-size: 15px; outline: none; resize: none;
      max-height: 120px; overflow-y: auto; line-height: 1.4;
      transition: border-color var(--transition); background: var(--bg);
      font-family: inherit;
    }
    #msg-input:focus { border-color: var(--primary); background: #fff; }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: var(--primary); color: #fff; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition); flex-shrink: 0;
    }
    .send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }

    /* ===== 欢迎页 ===== */
    .welcome-view {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; color: var(--text-muted); text-align: center; padding: 40px;
    }
    .welcome-icon { font-size: 64px; }
    .welcome-title { font-size: 22px; font-weight: 700; color: var(--text); }
    .welcome-sub { font-size: 14px; }

    /* ===== 表情面板 ===== */
    .emoji-panel {
      position: absolute; bottom: 70px; left: 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 12px; display: grid; grid-template-columns: repeat(8, 1fr);
      gap: 4px; z-index: 200; display: none;
      max-height: 200px; overflow-y: auto;
    }
    .emoji-panel.show { display: grid; }
    .emoji-btn-item { font-size: 22px; padding: 4px; cursor: pointer; border-radius: 6px; text-align: center; transition: background var(--transition); user-select: none; }
    .emoji-btn-item:hover { background: var(--bg); }

    /* ===== 侧边栏覆盖层(移动端) ===== */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    .sidebar-overlay.show { display: block; }

    /* ===== Toast ===== */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(40,40,60,0.92); color: #fff; padding: 10px 22px;
      border-radius: 24px; font-size: 14px; z-index: 9999;
      opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== 连接状态 ===== */
    #conn-bar {
      display: none; padding: 6px; text-align: center; font-size: 13px;
      font-weight: 600; flex-shrink: 0;
    }
    #conn-bar.connecting { display: block; background: var(--warning); color: #fff; }
    #conn-bar.disconnected { display: block; background: var(--danger); color: #fff; }

    /* ===== 响应式 移动端 ===== */
    @media (max-width: 768px) {
      :root { --sidebar-w: 85vw; }
      #app { flex-direction: row; height: 100dvh; }
      html, body { height: 100dvh; }
      /* 抽屉模式 */
      .sidebar {
        position: fixed; top: 0; left: 0;
        height: 100vh;
        height: 100dvh;
        padding-bottom: env(safe-area-inset-bottom);
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,0.35);
        z-index: 100; transition: transform 0.25s ease;
        display: flex; flex-direction: column;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar.collapsed { width: 44px !important; min-width: 44px !important; }
      .sidebar.collapsed .sidebar-section,
      .sidebar.collapsed .sidebar-item,
      .sidebar.collapsed .sidebar-footer,
      .sidebar.collapsed .sidebar-scroll,
      .sidebar.collapsed .app-title,
      .sidebar.collapsed .collapse-icon { display: none; }
      .sidebar.collapsed .sidebar-header { justify-content: center; padding: 0; }
      .sidebar.collapsed .logo { margin: 0; }
      .sidebar-header { height: 44px; cursor: pointer; user-select: none; flex-shrink: 0; }
      .sidebar-header .collapse-icon { margin-left: auto; font-size: 12px; color: rgba(255,255,255,0.5); transition: transform 0.2s; }
      .sidebar.collapsed .collapse-icon { display: block !important; transform: rotate(180deg); margin: 0; }
      .sidebar-scroll { flex: 1; overflow-y: auto; min-height: 0; }
      .sidebar-section { padding: 8px 14px 4px; font-size: 10px; }
      .sidebar-item { padding: 7px 14px; font-size: 13px; }
      .sidebar-footer { padding: 8px 14px; flex-shrink: 0; }
      .main { flex: 1; height: 100dvh; min-height: 0; display: flex; flex-direction: column; }
      .menu-btn { display: flex !important; align-items: center; justify-content: center; }
      .message { max-width: 88%; }
      .auth-box { padding: 36px 24px; }
      .chat-header { display: flex !important; height: 50px; padding: 0 14px; gap: 8px; }
      .chat-header-title { font-size: 14px; }
      .messages-area { padding: 12px 10px 6px; }
      .input-area { padding: 8px 10px; gap: 6px; }
      #msg-input { padding: 8px 14px; font-size: 14px; }
    }
    @media (max-width: 480px) {
      .chat-header { padding: 0 10px; gap: 6px; }
      .chat-header-title { font-size: 13px; }
      .messages-area { padding: 8px 6px 4px; }
      .input-area { padding: 6px 8px; gap: 4px; }
      #msg-input { padding: 6px 12px; font-size: 13px; }
      .msg-bubble { font-size: 13px; padding: 8px 12px; }
    }
  </style>
</head>
<body>

<!-- ===== 登录/注册页 ===== -->
<div id="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="logo-icon">💬</span>
      <h1>ChatApp</h1>
      <p>PC · Android · iOS 全平台即时通讯</p>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">登 录</div>
      <div class="auth-tab" onclick="switchTab('register')">注 册</div>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="输入用户名" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="输入密码" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <button class="btn-primary" onclick="doLogin()">登 录</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>用户名 <span style="color:var(--text-muted);font-weight:400;font-size:12px">（2~20位）</span></label>
        <input type="text" id="reg-username" placeholder="设置用户名" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>密码 <span style="color:var(--text-muted);font-weight:400;font-size:12px">（至少6位）</span></label>
        <input type="password" id="reg-password" placeholder="设置密码" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="reg-password2" placeholder="再次输入密码" autocomplete="new-password"
               onkeydown="if(event.key==='Enter') doRegister()" />
      </div>
      <button class="btn-primary" onclick="doRegister()">注 册</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ===== 主应用 ===== -->
<div id="app">
  <!-- 侧边栏遮罩 -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- 侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header" onclick="toggleSidebarCollapse()">
      <span class="logo">💬</span>
      <span class="app-title">ChatApp</span>
      <span class="collapse-icon" id="collapse-icon">▼</span>
    </div>

    <div class="sidebar-scroll" id="sidebar-scroll">
      <div class="sidebar-section">频道</div>
      <div id="rooms-list"></div>

      <div class="sidebar-section">私聊</div>
      <div id="users-list"></div>
    </div>

    <div class="sidebar-footer">
      <img class="user-avatar-sm" id="my-avatar" src="" alt="avatar" />
      <div class="user-info-sm">
        <div class="name" id="my-name">-</div>
        <div class="status">● 在线</div>
      </div>
      <button class="btn-logout" title="退出登录" onclick="confirmLogout()">🚪 退出</button>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main">
    <div id="conn-bar">正在连接...</div>

    <!-- 聊天头部 -->
    <div class="chat-header" id="chat-header" style="display:none">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div>
        <div class="chat-header-title" id="chat-title">-</div>
        <div class="chat-header-sub" id="chat-sub">-</div>
      </div>
      <div class="header-actions">
        <span class="online-count" id="online-count">0 在线</span>
      </div>
    </div>

    <!-- 欢迎页 -->
    <div class="welcome-view" id="welcome-view">
      <div class="welcome-icon">💬</div>
      <div class="welcome-title">欢迎使用 ChatApp</div>
      <div class="welcome-sub">从左侧选择频道或联系人开始聊天</div>
    </div>

    <!-- 消息区域 -->
    <div class="messages-area" id="messages-area" style="display:none"></div>

    <!-- 正在输入 -->
    <div class="typing-indicator" id="typing-indicator" style="display:none"></div>

    <!-- 输入栏 -->
    <div class="input-area" id="input-area" style="display:none">
      <div style="position:relative">
        <button class="toolbar-btn" title="表情" onclick="toggleEmoji()">😊</button>
        <div class="emoji-panel" id="emoji-panel"></div>
      </div>
      <textarea id="msg-input" rows="1" placeholder="输入消息… (Enter 发送 / Shift+Enter 换行)"
        oninput="autoResize(this); onTyping()"
        onkeydown="handleInputKey(event)"></textarea>
      <button class="send-btn" onclick="sendMessage()" title="发送">➤</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Socket.io 客户端（从后端服务获取） -->
<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  配置
// ═══════════════════════════════════════════════════════════════
// 自动检测后端地址：如果是本地开发，指向本地后端；生产环境可修改此处
const SERVER_URL = window.location.origin;

// ═══════════════════════════════════════════════════════════════
//  全局状态
// ═══════════════════════════════════════════════════════════════
let socket = null;
let currentUser = null;
let currentChat = null;   // { type: 'room'|'private', id, name }
let rooms = [];
let allUsers = [];
let onlineUsers = [];
let unreadMap = {};       // chatKey -> count
let typingTimers = {};
let myTypingTimer = null;
let lastDateLabel = '';
const EMOJIS = ['😀','😃','😄','😁','😆','😅','🤣','😂','🙂','🙃','😉','😊','😇',
  '😍','🤩','😘','😗','😚','😙','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔',
  '🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','🤥','😌','😔','😪','🤤','😴','😷',
  '🤒','🤕','🤢','🤮','🤧','🥵','🥶','🥴','😵','🤯','🤠','🥳','😎','🤓','🧐',
  '👍','👎','👏','🙌','🤝','🤜','🤛','✊','👊','🤚','✋','🖐','👋','🤙','💪',
  '❤️','🧡','💛','💚','💙','💜','🖤','💔','💕','💞','💓','💗','💖','💘','💝',
  '🎉','🎊','🎈','🎁','🎀','🏆','🥇','⭐','🌟','✨','💫','🔥','💯','🎯','👀'];

// ═══════════════════════════════════════════════════════════════
//  Auth
// ═══════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((el, i) => el.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? '' : 'none';
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return showAuthError('请填写用户名和密码');
  try {
    const res = await api('/api/login', 'POST', { username, password });
    onLoginSuccess(res);
  } catch(e) { showAuthError(e.message); }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;
  if (!username || !password) return showAuthError('请填写所有字段');
  if (password !== password2) return showAuthError('两次密码不一致');
  try {
    const res = await api('/api/register', 'POST', { username, password });
    onLoginSuccess(res);
  } catch(e) { showAuthError(e.message); }
}

function onLoginSuccess({ token, user }) {
  localStorage.setItem('chat_token', token);
  localStorage.setItem('chat_user', JSON.stringify(user));
  currentUser = user;
  initApp();
}

function confirmLogout() {
  if (!confirm('确定要退出登录吗？')) return;
  doLogout();
}

function doLogout() {
  if (socket) socket.disconnect();
  localStorage.removeItem('chat_token');
  localStorage.removeItem('chat_user');
  currentUser = null; currentChat = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-page').style.display = 'flex';
  showToast('已退出登录');
}

function showAuthError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

// ═══════════════════════════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════════════════════════
async function initApp() {
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  document.getElementById('my-name').textContent = currentUser.username;
  document.getElementById('my-avatar').src = currentUser.avatar || avatarUrl(currentUser.username);

  buildEmojiPanel();
  await loadRooms();
  connectSocket();
}

async function loadRooms() {
  try {
    rooms = await api('/api/rooms');
    renderRooms();
  } catch(e) { console.error(e); }
}

function renderRooms() {
  const el = document.getElementById('rooms-list');
  el.innerHTML = rooms.map(r => `
    <div class="sidebar-item" id="room-item-${r.id}" onclick="openRoom('${r.id}','${escHtml(r.name)}','${escHtml(r.description)}')">
      <span class="item-icon">#</span>
      <span class="item-name">${escHtml(r.name)}</span>
      <span class="badge" id="badge-room-${r.id}" style="display:none">0</span>
    </div>
  `).join('');
}

function renderUsers() {
  const el = document.getElementById('users-list');
  el.innerHTML = allUsers
    .filter(u => u.id !== currentUser.id)
    .map(u => {
      const isOnline = onlineUsers.some(o => o.id === u.id);
      const key = `private_${u.id}`;
      const unread = unreadMap[key] || 0;
      return `
      <div class="sidebar-item" id="user-item-${u.id}" onclick="openPrivate('${u.id}','${escHtml(u.username)}')">
        <div class="${isOnline ? 'online-dot' : ''}" style="${isOnline ? '' : 'width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0'}"></div>
        <span class="item-name">${escHtml(u.username)}</span>
        ${unread > 0 ? `<span class="badge" id="badge-private-${u.id}">${unread}</span>` : `<span class="badge" id="badge-private-${u.id}" style="display:none">0</span>`}
      </div>`;
    }).join('');
}

// ═══════════════════════════════════════════════════════════════
//  Socket.io
// ═══════════════════════════════════════════════════════════════
function connectSocket() {
  const token = localStorage.getItem('chat_token');
  setConnBar('connecting');

  socket = io(SERVER_URL, { auth: { token }, reconnectionAttempts: 10, reconnectionDelay: 2000 });

  socket.on('connect', () => {
    setConnBar('');
    showToast('已连接到服务器');
    // 重新加入当前房间
    if (currentChat?.type === 'room') socket.emit('join_room', currentChat.id);
    // 刷新用户列表
    api('/api/users').then(users => { allUsers = users; renderUsers(); });
  });

  socket.on('disconnect', () => { setConnBar('disconnected'); });
  socket.on('connect_error', (e) => { setConnBar('disconnected'); console.error(e.message); });

  socket.on('online_users', (users) => {
    onlineUsers = users;
    document.getElementById('online-count').textContent = `${users.length} 在线`;
    renderUsers();
  });

  socket.on('room_history', ({ roomId, messages }) => {
    if (currentChat?.type==='room' && currentChat.id===roomId) {
      renderMessages(messages, 'room');
    }
  });

  socket.on('new_message', (msg) => {
    const key = `room_${msg.room_id}`;
    if (currentChat?.type==='room' && currentChat.id===msg.room_id) {
      appendMessage(msg, 'room');
      scrollToBottom();
    } else {
      incUnread(key, `room-${msg.room_id}`);
    }
  });

  socket.on('new_private', (msg) => {
    const otherId = msg.from_id === currentUser.id ? msg.to_id : msg.from_id;
    const key = `private_${otherId}`;
    if (currentChat?.type==='private' && currentChat.id===otherId) {
      appendMessage(msg, 'private');
      scrollToBottom();
    } else if (msg.from_id !== currentUser.id) {
      incUnread(key, `private-${otherId}`);
      showToast(`💬 ${msg.from_name}: ${msg.content.slice(0,30)}`);
    }
  });

  socket.on('system_message', ({ roomId, text }) => {
    if (currentChat?.type==='room' && currentChat.id===roomId) {
      appendSystemMsg(text);
      scrollToBottom();
    }
  });

  socket.on('user_typing', ({ userId, username, isTyping }) => {
    if (currentChat?.type !== 'room') return;
    const el = document.getElementById('typing-indicator');
    if (!el) return;
    if (isTyping && userId !== currentUser.id) {
      el.textContent = `${username} 正在输入…`;
      clearTimeout(typingTimers[userId]);
      typingTimers[userId] = setTimeout(() => { el.textContent = ''; }, 3000);
    } else {
      clearTimeout(typingTimers[userId]);
      el.textContent = '';
    }
  });
}

// ═══════════════════════════════════════════════════════════════
//  打开聊天
// ═══════════════════════════════════════════════════════════════
function openRoom(id, name, desc) {
  if (currentChat?.type==='room' && currentChat.id===id) { closeSidebar(); return; }
  if (currentChat?.type==='room') socket.emit('leave_room', currentChat.id);

  currentChat = { type: 'room', id, name };
  setActiveItem(`room-item-${id}`);
  clearUnread(`room_${id}`, `room-${id}`);
  showChatUI(`# ${name}`, desc || '频道聊天');
  clearMessages();

  socket.emit('join_room', id);
  closeSidebar();
}

async function openPrivate(userId, username) {
  if (currentChat?.type==='private' && currentChat.id===userId) { closeSidebar(); return; }
  if (currentChat?.type==='room') socket.emit('leave_room', currentChat.id);

  currentChat = { type: 'private', id: userId, name: username };
  setActiveItem(`user-item-${userId}`);
  clearUnread(`private_${userId}`, `private-${userId}`);
  const u = allUsers.find(u => u.id===userId);
  const isOnline = onlineUsers.some(o => o.id===userId);
  showChatUI(username, isOnline ? '● 在线' : '离线');
  clearMessages();

  try {
    const msgs = await api(`/api/private/${userId}`);
    renderMessages(msgs, 'private');
  } catch(e) {}
  closeSidebar();
}

// ═══════════════════════════════════════════════════════════════
//  发送消息
// ═══════════════════════════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !currentChat) return;
  if (currentChat.type === 'room') {
    socket.emit('send_message', { roomId: currentChat.id, content });
  } else {
    socket.emit('send_private', { toUserId: currentChat.id, content });
  }
  input.value = '';
  input.style.height = '';
  clearTyping();
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function onTyping() {
  if (!socket || currentChat?.type !== 'room') return;
  socket.emit('typing', { roomId: currentChat.id, isTyping: true });
  clearTimeout(myTypingTimer);
  myTypingTimer = setTimeout(clearTyping, 2000);
}

function clearTyping() {
  if (!socket || currentChat?.type !== 'room') return;
  socket.emit('typing', { roomId: currentChat.id, isTyping: false });
}

// ═══════════════════════════════════════════════════════════════
//  渲染消息
// ═══════════════════════════════════════════════════════════════
function renderMessages(msgs, type) {
  const area = document.getElementById('messages-area');
  area.innerHTML = '';
  lastDateLabel = '';
  msgs.forEach(m => appendMessage(m, type));
  scrollToBottom();
}

function appendMessage(msg, type) {
  const area = document.getElementById('messages-area');
  const ts = (msg.created_at || 0) * 1000;
  const dateLabel = formatDate(ts);
  if (dateLabel !== lastDateLabel) {
    lastDateLabel = dateLabel;
    const div = document.createElement('div');
    div.className = 'msg-date-divider';
    div.innerHTML = `<span>${dateLabel}</span>`;
    area.appendChild(div);
  }

  const isMe = msg.sender_id === currentUser.id || msg.from_id === currentUser.id;
  const senderId = msg.sender_id || msg.from_id;
  const senderName = msg.sender_name || msg.from_name || (isMe ? currentUser.username : '用户');
  const avatarSrc = isMe ? (currentUser.avatar || avatarUrl(currentUser.username)) : avatarUrl(senderName);

  const div = document.createElement('div');
  div.className = `message ${isMe ? 'me' : 'other'}`;
  div.innerHTML = `
    <img class="msg-avatar" src="${avatarSrc}" alt="${escHtml(senderName)}"
         onerror="this.src='${avatarUrl(senderName)}'" />
    <div class="msg-body">
      ${!isMe ? `<div class="msg-name">${escHtml(senderName)}</div>` : ''}
      <div class="msg-bubble">${escHtml(msg.content)}</div>
      <div class="msg-time">${formatTime(ts)}</div>
    </div>
  `;
  area.appendChild(div);
}

function appendSystemMsg(text) {
  const area = document.getElementById('messages-area');
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.innerHTML = `<span>${escHtml(text)}</span>`;
  area.appendChild(div);
}

function clearMessages() {
  document.getElementById('messages-area').innerHTML = '';
  lastDateLabel = '';
}

// ═══════════════════════════════════════════════════════════════
//  未读计数
// ═══════════════════════════════════════════════════════════════
function incUnread(key, badgeKey) {
  unreadMap[key] = (unreadMap[key] || 0) + 1;
  const [prefix, id] = badgeKey.split('-');
  const badgeEl = document.getElementById(`badge-${badgeKey}`);
  if (badgeEl) { badgeEl.textContent = unreadMap[key]; badgeEl.style.display = ''; }
}

function clearUnread(key, badgeKey) {
  unreadMap[key] = 0;
  const badgeEl = document.getElementById(`badge-${badgeKey}`);
  if (badgeEl) { badgeEl.style.display = 'none'; }
}

// ═══════════════════════════════════════════════════════════════
//  UI 工具
// ═══════════════════════════════════════════════════════════════
function showChatUI(title, sub) {
  document.getElementById('welcome-view').style.display = 'none';
  document.getElementById('messages-area').style.display = 'flex';
  document.getElementById('messages-area').style.flexDirection = 'column';
  document.getElementById('typing-indicator').style.display = '';
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('chat-header').style.display = 'flex';
  document.getElementById('chat-title').textContent = title;
  document.getElementById('chat-sub').textContent = sub;
}

function setActiveItem(id) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function scrollToBottom() {
  const area = document.getElementById('messages-area');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function setConnBar(state) {
  const bar = document.getElementById('conn-bar');
  bar.className = state ? state : '';
  if (state === 'connecting') bar.textContent = '🔄 正在连接服务器…';
  else if (state === 'disconnected') bar.textContent = '❌ 连接断开，正在重连…';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// 手机端侧边栏收起/展开
function toggleSidebarCollapse() {
  const sb = document.getElementById('sidebar');
  const icon = document.getElementById('collapse-icon');
  sb.classList.toggle('collapsed');
  if (icon) icon.textContent = sb.classList.contains('collapsed') ? '▲' : '▼';
}

function toggleEmoji() {
  document.getElementById('emoji-panel').classList.toggle('show');
}

function buildEmojiPanel() {
  const panel = document.getElementById('emoji-panel');
  panel.innerHTML = EMOJIS.map(e =>
    `<span class="emoji-btn-item" onclick="insertEmoji('${e}')">${e}</span>`
  ).join('');
}

function insertEmoji(emoji) {
  const input = document.getElementById('msg-input');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
  document.getElementById('emoji-panel').classList.remove('show');
  autoResize(input);
}

// 点击其他地方关闭表情面板
document.addEventListener('click', (e) => {
  const panel = document.getElementById('emoji-panel');
  if (panel && !panel.contains(e.target) && !e.target.title?.includes('表情')) {
    panel.classList.remove('show');
  }
});

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════════════════════════
async function api(path, method='GET', body=null) {
  const token = localStorage.getItem('chat_token');
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SERVER_URL + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function avatarUrl(name) {
  return `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(name)}`;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return '今天';
  const y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
  return `${y}年${m}月${day}日`;
}

// ═══════════════════════════════════════════════════════════════
//  启动
// ═══════════════════════════════════════════════════════════════
(async function init() {
  const token = localStorage.getItem('chat_token');
  const user  = localStorage.getItem('chat_user');
  if (token && user) {
    try {
      currentUser = JSON.parse(user);
      await initApp();
    } catch(e) {
      localStorage.clear();
    }
  }
})();
</script>
